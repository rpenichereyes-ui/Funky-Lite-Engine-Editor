<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNF Tool Master - Preview Edition</title>
    <style>
        :root { --primary: #ff3c3c; --bg: #0d0d0d; --card: #1a1a1a; --accent: #00ff00; --cyan: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .nav-tabs { display: flex; background: #000; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: #666; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #111; }

        .music-ctrl { position: fixed; top: 60px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid var(--accent); color: var(--accent); padding: 8px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; }

        .view-port { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; }
        .container { display: none; width: 100%; }
        .container.active { display: block; }

        .editor-layout { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 900px) { .editor-layout { flex-direction: row; align-items: flex-start; } .canvas-section { flex: 2; } .control-section { flex: 1; position: sticky; top: 10px; } }

        .sheet-viewer { background: #000; height: 45vh; overflow: auto; position: relative; border: 1px solid #333; border-radius: 8px; background-image: conic-gradient(#111 90deg, #181818 90deg 180deg, #111 180deg 270deg, #181818 270deg); background-size: 20px 20px; }
        #mainCanvas { display: block; }

        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .preview-box { background: #000; border: 1px solid #444; border-radius: 8px; padding: 5px; text-align: center; }
        .p-canvas { width: 100%; height: 100px; object-fit: contain; background: transparent; }

        .card { background: var(--card); border-radius: 10px; padding: 15px; border: 1px solid #222; margin-bottom: 15px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        
        #frameList, #packList { max-height: 200px; overflow-y: auto; background: #111; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }
        .frame-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 11px; }
        .frame-item:last-child { border-bottom: none; }
        .frame-info { cursor: pointer; color: var(--cyan); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .del-btn { background: var(--primary); color: white; border: none; border-radius: 4px; padding: 6px 10px; cursor: pointer; font-size: 10px; font-weight: bold; margin-left: 5px; }

        .slider-container { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; border: 1px dashed #444; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-cyan { background: var(--cyan); color: #000; margin-bottom: 8px; }
        .btn-red { background: var(--primary); color: #fff; }

        #selectionBox { display:none; position:absolute; border:2px solid var(--accent); pointer-events: none; }
        #handle-br { position:absolute; bottom:-12px; right:-12px; width:24px; height:24px; background:var(--accent); border-radius:50%; border:4px solid #000; cursor: se-resize; pointer-events: auto; }

        #status { background: #000; color: var(--accent); font-size: 10px; padding: 8px; text-align: center; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; z-index: 1000; }
    </style>
</head>
<body>

<button class="music-ctrl" id="musicBtn" onclick="toggleMusic()">🔇 AUDIO: OFF</button>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'xml-maker')">Maker</button>
    <button class="tab-btn" onclick="switchTab(event, 'xml-packer')">Packer</button>
    <button class="tab-btn" onclick="switchTab(event, 'optimizer')">Optimizer</button>
    <button class="tab-btn" onclick="switchTab(event, 'chart-fixer')">Fixer</button>
</nav>

<div class="view-port">
    <div id="xml-maker" class="container active">
        <div class="editor-layout">
            <div class="canvas-section">
                <label>🖼️ PNG Sprite</label><input type="file" id="pngIn" accept="image/png">
                <div class="sheet-viewer">
                    <canvas id="mainCanvas"></canvas>
                    <div id="selectionBox"><div id="handle-br"></div></div>
                </div>
            </div>
            <div class="control-section">
                <div class="preview-grid">
                    <div class="preview-box"><label>Estático</label><canvas id="pStatic" class="p-canvas"></canvas></div>
                    <div class="preview-box"><label style="color:var(--cyan)">Animación</label><canvas id="pAnim" class="p-canvas"></canvas></div>
                </div>
                <div class="card">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <input type="number" id="inpX" placeholder="X" oninput="manualUpdate()">
                        <input type="number" id="inpY" placeholder="Y" oninput="manualUpdate()">
                        <input type="number" id="inpW" placeholder="W" oninput="manualUpdate()">
                        <input type="number" id="inpH" placeholder="H" oninput="manualUpdate()">
                    </div>
                    <input type="text" id="frameName" value="idle0000">
                    <button class="btn btn-cyan" onclick="saveFrame()">💾 Guardar Frame</button>
                    
                    <label style="margin-top:10px;">📋 Lista de Frames</label>
                    <div id="frameList">
                        <div style="padding:15px; color:#444; text-align:center; font-size:10px;">📭 LISTA VACÍA</div>
                    </div>

                    <button class="btn btn-red" onclick="exportXML()">📤 Exportar XML</button>
                </div>
            </div>
        </div>
    </div>

    <div id="xml-packer" class="container">
        <div class="card" style="max-width:500px; margin:auto;">
            <h3 style="color:var(--accent); text-align:center;">📦 Sprite Packer</h3>
            <p style="font-size: 10px; color: #888; margin-bottom: 15px; text-align: center;">Selecciona varios PNGs individuales para crear un Spritesheet automático.</p>
            
            <label>Seleccionar archivos</label>
            <input type="file" id="packIn" accept="image/png" multiple onchange="handlePackSelect(this)">
            
            <div id="packList">
                <div style="padding:15px; color:#444; text-align:center; font-size:10px;">📭 NINGÚN ARCHIVO</div>
            </div>

            <button class="btn btn-cyan" onclick="generateAtlas()">🔨 Generar XML + PNG</button>
        </div>
    </div>

    <div id="optimizer" class="container">
        <div class="card" style="max-width:500px; margin:auto;">
            <h3 style="color:var(--cyan); text-align:center;">⚡ Optimizer</h3>
            <label>PNG Original</label><input type="file" id="optPngIn">
            <label>XML Original</label><input type="file" id="optXmlIn">
            <div class="slider-container">
                <label>Escala de Reducción</label>
                <span style="color:var(--cyan); font-weight:bold; font-size:20px;" id="valScale">0.5</span>
                <input type="range" id="optScale" min="0.1" max="1.0" step="0.1" value="0.5" oninput="document.getElementById('valScale').innerText=this.value">
            </div>
            <button class="btn btn-cyan" onclick="processOpt()">🚀 Optimizar</button>
        </div>
    </div>

    <div id="chart-fixer" class="container">
        <div class="card" style="max-width:400px; margin:auto;">
            <h3 style="color:var(--primary); text-align:center;">🔧 Chart Fixer</h3>
            <label>JSON de Canción</label><input type="file" id="jsonIn">
            <button class="btn btn-red" onclick="fixChart()">🛠️ Reparar Chart</button>
        </div>
    </div>
</div>

<div id="status">SISTEMA LISTO</div>

<script>
    const bgMusic = new Audio("https://fridaynightfunkin.wiki.gg/images/Artistic_Expression.mp3?14cbe8");
    bgMusic.loop = true; bgMusic.volume = 0.4;
    const clickSfx = new Audio("https://www.myinstants.com/media/sounds/click-mouse.mp3");

    let audioUnlocked = false;
    let packFiles = []; // Almacén para los archivos del Packer

    function initAudio() {
        if (audioUnlocked) return;
        bgMusic.play().then(() => {
            bgMusic.pause();
            audioUnlocked = true;
            status("AUDIO CONFIGURADO");
        }).catch(() => {});
    }

    function toggleMusic() {
        initAudio();
        if(bgMusic.paused) { bgMusic.play(); updateMusicUI(true); } 
        else { bgMusic.pause(); updateMusicUI(false); }
    }

    function updateMusicUI(on) { document.getElementById('musicBtn').innerText = on ? "🔊 AUDIO: ON" : "🔇 AUDIO: OFF"; }

    document.addEventListener('mousedown', (e) => {
        initAudio();
        if(['BUTTON','INPUT','CANVAS'].includes(e.target.tagName)) {
            clickSfx.currentTime = 0;
            clickSfx.play().catch(() => {});
        }
    });

    function switchTab(e, id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // --- PACKER LOGIC ---
    function handlePackSelect(input) {
        const newFiles = Array.from(input.files);
        // Filtrar duplicados por nombre
        newFiles.forEach(f => {
            if(!packFiles.find(existing => existing.name === f.name)) {
                packFiles.push(f);
            }
        });
        renderPackList();
        input.value = ""; // Reset para permitir volver a elegir el mismo
    }

    function renderPackList() {
        const list = document.getElementById('packList');
        if(packFiles.length === 0) {
            list.innerHTML = '<div style="padding:15px; color:#444; text-align:center; font-size:10px;">📭 NINGÚN ARCHIVO</div>';
            return;
        }
        list.innerHTML = packFiles.map((f, i) => `
            <div class="frame-item">
                <span class="frame-info">📄 ${f.name}</span>
                <button class="del-btn" onclick="removePackFile(${i})">BORRAR</button>
            </div>
        `).join('');
    }

    function removePackFile(index) {
        packFiles.splice(index, 1);
        renderPackList();
        status("ARCHIVO ELIMINADO");
    }

    async function generateAtlas() {
        if(packFiles.length === 0) return alert("Agrega archivos PNG primero");
        status("GENERANDO ATLAS...");

        const loaded = [];
        for(let file of packFiles) {
            const data = await new Promise(resolve => {
                const img = new Image();
                const reader = new FileReader();
                reader.onload = (e) => {
                    img.onload = () => resolve({img, name: file.name.replace('.png', '')});
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            });
            loaded.push(data);
        }

        // Algoritmo de empaquetado simple (vertical)
        let totalH = 0, maxW = 0;
        loaded.forEach(d => {
            totalH += d.img.height;
            if(d.img.width > maxW) maxW = d.img.width;
        });

        const canvas = document.createElement('canvas');
        canvas.width = maxW; canvas.height = totalH;
        const ctx = canvas.getContext('2d');
        let currentY = 0;
        let xml = '<?xml version="1.0" encoding="utf-8"?>\n<TextureAtlas imagePath="sprite.png">\n';

        loaded.forEach(d => {
            ctx.drawImage(d.img, 0, currentY);
            xml += `  <SubTexture name="${d.name}" x="0" y="${currentY}" width="${d.img.width}" height="${d.img.height}"/>\n`;
            currentY += d.img.height;
        });

        xml += '</TextureAtlas>';
        
        canvas.toBlob(b => saveFile(b, "sprite.png", "image/png"));
        saveFile(xml, "sprite.xml", "text/xml");
        status("ATLAS COMPLETADO");
    }

    // --- MAKER LOGIC ---
    let img = new Image(), frames = [], animIdx = 0;
    let cur = { x: 0, y: 0, w: 100, h: 100 };
    const mCan = document.getElementById('mainCanvas'), mCtx = mCan.getContext('2d');
    const sCan = document.getElementById('pStatic'), sCtx = sCan.getContext('2d');
    const aCan = document.getElementById('pAnim'), aCtx = aCan.getContext('2d');
    const sBox = document.getElementById('selectionBox');

    document.getElementById('pngIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = (ev) => { 
            img.onload = () => { 
                mCan.width = img.width; 
                mCan.height = img.height; 
                draw(); 
                status("IMAGEN CARGADA: " + img.width + "x" + img.height);
            }; 
            img.src = ev.target.result; 
        };
        r.readAsDataURL(file);
    };

    mCan.onmousedown = (e) => {
        if(!img.src) return;
        const rect = mCan.getBoundingClientRect();
        const sx = mCan.width/rect.width, sy = mCan.height/rect.height;
        cur.x = Math.max(0, Math.round(((e.clientX - rect.left) * sx) - cur.w/2));
        cur.y = Math.max(0, Math.round(((e.clientY - rect.top) * sy) - cur.h/2));
        updateVisuals();
    };

    function manualUpdate() {
        cur.x = parseInt(document.getElementById('inpX').value) || 0;
        cur.y = parseInt(document.getElementById('inpY').value) || 0;
        cur.w = parseInt(document.getElementById('inpW').value) || 10;
        cur.h = parseInt(document.getElementById('inpH').value) || 10;
        updateVisuals(false);
    }

    function updateVisuals(updInp = true) {
        if(updInp) {
            document.getElementById('inpX').value = cur.x; document.getElementById('inpY').value = cur.y;
            document.getElementById('inpW').value = cur.w; document.getElementById('inpH').value = cur.h;
        }
        const rect = mCan.getBoundingClientRect();
        const vx = rect.width/mCan.width, vy = rect.height/mCan.height;
        sBox.style.display = 'block';
        sBox.style.left = (cur.x * vx) + 'px'; sBox.style.top = (cur.y * vy) + 'px';
        sBox.style.width = (cur.w * vx) + 'px'; sBox.style.height = (cur.h * vy) + 'px';
        
        sCan.width = cur.w; sCan.height = cur.h;
        sCtx.imageSmoothingEnabled = false;
        if(img.src) sCtx.drawImage(img, cur.x, cur.y, cur.w, cur.h, 0, 0, cur.w, cur.h);
    }

    setInterval(() => {
        if(!frames.length || !img.src) return;
        animIdx = (animIdx + 1) % frames.length;
        const f = frames[animIdx];
        aCan.width = f.w; aCan.height = f.h;
        aCtx.imageSmoothingEnabled = false;
        aCtx.clearRect(0,0,f.w,f.h);
        aCtx.drawImage(img, f.x, f.y, f.w, f.h, 0, 0, f.w, f.h);
    }, 100);

    function saveFrame() {
        if(!img.src) return;
        const nameInp = document.getElementById('frameName');
        frames.push({...cur, name: nameInp.value});
        nameInp.value = nameInp.value.replace(/(\d+)/, (v) => (parseInt(v)+1).toString().padStart(v.length, '0'));
        renderFrameList();
        draw();
        status("FRAME GUARDADO (" + frames.length + ")");
    }

    function renderFrameList() {
        const list = document.getElementById('frameList');
        if(frames.length === 0) {
            list.innerHTML = '<div style="padding:15px; color:#444; text-align:center; font-size:10px;">📭 LISTA VACÍA</div>';
            return;
        }
        list.innerHTML = frames.map((f, i) => `
            <div class="frame-item">
                <span class="frame-info" onclick="loadFrame(${i})">🖼️ ${i}. ${f.name} <small>(${f.w}x${f.h})</small></span>
                <button class="del-btn" onclick="deleteFrame(${i})">🗑️ BORRAR</button>
            </div>
        `).join('');
    }

    function loadFrame(i) {
        const f = frames[i];
        cur = { x: f.x, y: f.y, w: f.w, h: f.h };
        document.getElementById('frameName').value = f.name;
        updateVisuals();
    }

    function deleteFrame(i) {
        frames.splice(i, 1);
        renderFrameList();
        draw();
        status("FRAME ELIMINADO");
    }

    function draw() {
        if(!img.src) return;
        mCtx.clearRect(0,0,mCan.width, mCan.height); 
        mCtx.drawImage(img, 0,0);
        mCtx.strokeStyle = "#00ff00"; 
        mCtx.lineWidth = 2;
        frames.forEach(f => mCtx.strokeRect(f.x, f.y, f.w, f.h));
    }

    function exportXML() {
        if(!frames.length) return alert("No hay frames");
        let xml = '<?xml version="1.0" encoding="utf-8"?>\n<TextureAtlas imagePath="sprite.png">\n';
        frames.forEach(f => xml += `  <SubTexture name="${f.name}" x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}"/>\n`);
        saveFile(xml + '</TextureAtlas>', "sprite.xml", "text/xml");
        status("XML EXPORTADO");
    }

    async function processOpt() {
        const pFile = document.getElementById('optPngIn').files[0];
        const xFile = document.getElementById('optXmlIn').files[0];
        const scale = parseFloat(document.getElementById('optScale').value);
        if(!pFile || !xFile) return alert("Faltan archivos");
        status("OPTIMIZANDO...");
        const tImg = new Image(); tImg.src = URL.createObjectURL(pFile);
        await new Promise(r => tImg.onload = r);
        const c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(tImg.width * scale)); 
        c.height = Math.max(1, Math.round(tImg.height * scale));
        const ctx = c.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(tImg, 0, 0, c.width, c.height);
        c.toBlob(b => saveFile(b, "optimized.png", "image/png"));
        const reader = new FileReader();
        reader.onload = (e) => {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const tags = xml.getElementsByTagName("SubTexture");
            for(let t of tags) {
                ["x","y","width","height","frameX","frameY","frameWidth","frameHeight"].forEach(a => {
                    if(t.getAttribute(a)) t.setAttribute(a, Math.round(t.getAttribute(a) * scale));
                });
            }
            saveFile(new XMLSerializer().serializeToString(xml), "optimized.xml", "text/xml");
            status("OPTIMIZACIÓN COMPLETADA");
        };
        reader.readAsText(xFile);
    }

        function fixChart() {
        const file = document.getElementById('jsonIn').files[0];
        if(!file) return alert("Selecciona un JSON");
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                let data = JSON.parse(e.target.result);
                let song = data.song ? data.song : data;
                if(song.notes) {
                    song.notes.forEach(section => {
                        if(section.sectionNotes) {
                            section.sectionNotes.forEach(n => { if(n[1] < 0) n[1] = 0; });
                        }
                    });
                    saveFile(JSON.stringify(data), "fixed_chart.json", "application/json");
                    status("CHART REPARADO");
                }
            } catch(err) { alert("Error al leer el JSON"); }
        };
        reader.readAsText(file);
    }

    function saveFile(content, name, type) {
        const b = (content instanceof Blob) ? content : new Blob([content], {type});
        const u = URL.createObjectURL(b);
        const a = document.createElement('a'); a.href = u; a.download = name; a.click();
        setTimeout(() => URL.revokeObjectURL(u), 1000);
    }

    function status(m) { document.getElementById('status').innerText = "✓ " + m.toUpperCase(); }

    let isRez = false;
    document.getElementById('handle-br').addEventListener('mousedown', (e) => { e.stopPropagation(); isRez = true; });
    window.addEventListener('mousemove', (e) => {
        if(!isRez) return;
        const rect = mCan.getBoundingClientRect();
        const sx = mCan.width/rect.width, sy = mCan.height/rect.height;
        cur.w = Math.max(5, Math.round(((e.clientX - rect.left) * sx) - cur.x));
        cur.h = Math.max(5, Math.round(((e.clientY - rect.top) * sy) - cur.y));
        updateVisuals();
    });
    window.addEventListener('mouseup', () => isRez = false);
</script>
</body>
</html>
