<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FNF Tool Master - Ultimate Edition</title>
<style>
    :root { --primary: #ff3c3c; --bg: #0a0a0a; --card: #161616; --accent: #00ff00; --cyan: #00d4ff; --purple: #a200ff; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #d1d1d1; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    
    /* Tabs System */
    .nav-tabs { display: flex; background: #000; width: 100%; justify-content: center; border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 2000; }
    .tab-btn { padding: 15px 25px; border: none; background: none; color: #777; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
    .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #111; }
    .tab-btn:hover:not(.active) { color: #fff; background: #0a0a0a; }

    .container { max-width: 1100px; width: 95%; padding: 20px; display: none; }
    .container.active { display: block; }

    .header { text-align: center; margin-bottom: 15px; }
    .header h1 { color: var(--primary); font-size: 20px; text-transform: uppercase; margin: 0; letter-spacing: 2px; }

    /* Layouts */
    .editor-layout { display: flex; gap: 20px; flex-wrap: wrap; }
    .canvas-section { flex: 2; min-width: 400px; }
    .control-section { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 15px; }

    .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; margin-bottom: 15px; }
    .card-title { font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; padding-left: 10px; border-left: 4px solid var(--primary); color: var(--primary); }

    label { display: block; font-size: 10px; color: #777; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
    input { width: 100%; box-sizing: border-box; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
    
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .btn-red { background: var(--primary); color: #fff; }
    .btn-blue { background: var(--cyan); color: #000; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-green { background: var(--accent); color: #000; }

    .sheet-viewer { background: #000; border-radius: 8px; border: 1px solid #333; overflow: auto; max-height: 55vh; position: relative; cursor: crosshair; }
    #mainCanvas { display: block; }

    .preview-box { background: #000; border: 2px solid var(--accent); border-radius: 8px; padding: 10px; text-align: center; }
    #previewCanvas { background: #1a1a1a; max-width: 100%; image-rendering: pixelated; display: block; margin: 0 auto; min-height: 120px; }
    
    .frame-list { background: #000; border-radius: 8px; border: 1px solid #333; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; }
    .frame-item { padding: 6px 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .del-btn { color: var(--primary); cursor: pointer; border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 9px; }

    .coords-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; }

    #selectionBox { display:none; position:absolute; border:2px solid var(--accent); pointer-events: none; box-shadow: 0 0 8px rgba(0,255,0,0.4); }
    .resize-handle { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; bottom: -6px; right: -6px; cursor: se-resize; pointer-events: auto; border: 2px solid #000; }

    #status { background: #000; color: var(--accent); font-size: 10px; padding: 8px; text-align: center; font-family: monospace; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; z-index: 3000; }
</style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab('xml-maker')">Modo 1: XML Maker</button>
    <button class="tab-btn" onclick="openTab('optimizer')">Modo 2: Optimizer</button>
    <button class="tab-btn" onclick="openTab('chart-fixer')">Modo 3: Chart Fixer</button>
</div>

<div id="xml-maker" class="container active">
    <div class="header"><h1>XML Manual Editor</h1></div>
    <div class="card">
        <label>Imagen Spritesheet (PNG)</label>
        <input type="file" id="pngIn" accept="image/png">
        <div class="editor-layout">
            <div class="canvas-section">
                <div class="sheet-viewer">
                    <canvas id="mainCanvas"></canvas>
                    <div id="selectionBox"><div class="resize-handle" id="handle-br"></div></div>
                </div>
            </div>
            <div class="control-section">
                <div class="preview-box">
                    <label style="color:var(--accent)">Preview</label>
                    <canvas id="previewCanvas"></canvas>
                </div>
                <div class="card" style="background:#111;">
                    <label>Ajuste Manual</label>
                    <div class="coords-grid">
                        <div><label>X</label><input type="number" id="inpX" value="0" oninput="manualUpdate()"></div>
                        <div><label>Y</label><input type="number" id="inpY" value="0" oninput="manualUpdate()"></div>
                        <div><label>W</label><input type="number" id="inpW" value="100" oninput="manualUpdate()"></div>
                        <div><label>H</label><input type="number" id="inpH" value="100" oninput="manualUpdate()"></div>
                    </div>
                    <label>Nombre del Frame</label>
                    <input type="text" id="frameName" value="idle0000">
                    <button class="btn btn-green" onclick="saveCurrentFrame()">💾 Guardar Frame</button>
                </div>
                <div class="card" style="background:#111;">
                    <label>Lista de Frames</label>
                    <div class="frame-list" id="frameList"></div>
                    <button class="btn btn-red" onclick="exportXML()" style="margin-top:10px;">📤 Exportar XML</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="optimizer" class="container">
    <div class="header"><h1>Pack Optimizer</h1></div>
    <div class="card" style="max-width:500px; margin: 0 auto;">
        <div class="card-title" style="color:var(--cyan); border-left-color:var(--cyan)">Reducción de Peso</div>
        <label>PNG Original</label><input type="file" id="optPngIn" accept="image/png">
        <label>XML Original</label><input type="file" id="optXmlIn" accept=".xml">
        <label>Escala: <span id="valScale">0.5</span></label>
        <input type="range" id="optScale" min="0.1" max="0.9" step="0.1" value="0.5" oninput="document.getElementById('valScale').innerText=this.value">
        <button class="btn btn-blue" onclick="processOptimization()">🚀 Optimizar Pack</button>
    </div>
</div>

<div id="chart-fixer" class="container">
    <div class="header"><h1>Chart Fixer</h1></div>
    <div class="card" style="max-width:500px; margin: 0 auto;">
        <div class="card-title" style="color:var(--purple); border-left-color:var(--purple)">Reparar para 0.5.1</div>
        <label>Archivo JSON del Chart</label>
        <input type="file" id="jsonIn" accept=".json">
        <button class="btn btn-purple" onclick="adaptChart()">🔧 Adaptar Chart</button>
    </div>
</div>

<div id="status">SISTEMA INICIADO</div>

<script>
    // --- NAVEGACIÓN ---
    function openTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- MODO 1: LÓGICA ---
    let img = new Image(), savedFrames = [];
    let currentSel = { x: 0, y: 0, w: 100, h: 100, active: false };
    const mainCanvas = document.getElementById('mainCanvas'), ctx = mainCanvas.getContext('2d');
    const selectionBox = document.getElementById('selectionBox'), previewCanvas = document.getElementById('previewCanvas'), pctx = previewCanvas.getContext('2d');
    const inps = { x: document.getElementById('inpX'), y: document.getElementById('inpY'), w: document.getElementById('inpW'), h: document.getElementById('inpH') };

    document.getElementById('pngIn').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { img.src = ev.target.result; img.onload = () => { mainCanvas.width = img.width; mainCanvas.height = img.height; drawMain(); status("Imagen cargada"); }};
        r.readAsDataURL(e.target.files[0]);
    };

    mainCanvas.onmousedown = (e) => {
        if(!img.src) return;
        const rect = mainCanvas.getBoundingClientRect();
        const sX = mainCanvas.width / rect.width, sY = mainCanvas.height / rect.height;
        currentSel.x = Math.round(((e.clientX - rect.left) * sX) - currentSel.w/2);
        currentSel.y = Math.round(((e.clientY - rect.top) * sY) - currentSel.h/2);
        currentSel.active = true; updateEverything();
    };

    function manualUpdate() {
        if(!currentSel.active) currentSel.active = true;
        currentSel.x = parseInt(inps.x.value) || 0; currentSel.y = parseInt(inps.y.value) || 0;
        currentSel.w = parseInt(inps.w.value) || 10; currentSel.h = parseInt(inps.h.value) || 10;
        updateEverything(false);
    }

    function updateEverything(updateInputs = true) {
        if(currentSel.x < 0) currentSel.x = 0; if(currentSel.y < 0) currentSel.y = 0;
        if(updateInputs) { inps.x.value = currentSel.x; inps.y.value = currentSel.y; inps.w.value = currentSel.w; inps.h.value = currentSel.h; }
        const rect = mainCanvas.getBoundingClientRect();
        const vX = rect.width / mainCanvas.width, vY = rect.height / mainCanvas.height;
        selectionBox.style.display = 'block';
        selectionBox.style.left = (currentSel.x * vX) + 'px'; selectionBox.style.top = (currentSel.y * vY) + 'px';
        selectionBox.style.width = (currentSel.w * vX) + 'px'; selectionBox.style.height = (currentSel.h * vY) + 'px';
        previewCanvas.width = currentSel.w; previewCanvas.height = currentSel.h;
        pctx.drawImage(img, currentSel.x, currentSel.y, currentSel.w, currentSel.h, 0, 0, currentSel.w, currentSel.h);
    }

    function saveCurrentFrame() {
        const nameInput = document.getElementById('frameName');
        savedFrames.push({...currentSel, name: nameInput.value});
        nameInput.value = nameInput.value.replace(/(\d+)/, (n) => (parseInt(n)+1).toString().padStart(n.length, '0'));
        updateDOMFrames(); drawMain();
    }

    function removeFrame(i) { savedFrames.splice(i, 1); updateDOMFrames(); drawMain(); }

    function updateDOMFrames() {
        const list = document.getElementById('frameList');
        list.innerHTML = savedFrames.map((f, i) => `<div class="frame-item"><span>${f.name}</span><span class="del-btn" onclick="removeFrame(${i})">✕</span></div>`).join('');
    }

    function drawMain() {
        ctx.clearRect(0,0,mainCanvas.width, mainCanvas.height); ctx.drawImage(img, 0,0);
        ctx.strokeStyle = "red"; savedFrames.forEach(f => ctx.strokeRect(f.x, f.y, f.w, f.h));
    }

    function exportXML() {
        let xml = '<?xml version="1.0" encoding="utf-8"?>\n<TextureAtlas imagePath="sprite.png">\n';
        savedFrames.forEach(f => xml += `  <SubTexture name="${f.name}" x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}"/>\n`);
        saveFile(xml + '</TextureAtlas>', "sprite.xml", "text/xml");
    }

    // --- MODO 2: OPTIMIZER ---
    function processOptimization() {
        const pFile = document.getElementById('optPngIn').files[0], xFile = document.getElementById('optXmlIn').files[0], s = parseFloat(document.getElementById('optScale').value);
        if(!pFile || !xFile) return alert("Sube ambos archivos");
        const baseName = pFile.name.split('.')[0];
        const r = new FileReader();
        r.onload = (e) => {
            const i = new Image();
            i.onload = () => {
                const c = document.createElement('canvas'); c.width = Math.round(i.width*s); c.height = Math.round(i.height*s);
                const ctxOpt = c.getContext('2d'); ctxOpt.imageSmoothingEnabled = false; ctxOpt.drawImage(i, 0,0,c.width,c.height);
                const a = document.createElement('a'); a.href = c.toDataURL(); a.download = baseName + ".png"; a.click();
                const rx = new FileReader();
                rx.onload = (ex) => {
                    const xml = new DOMParser().parseFromString(ex.target.result, "text/xml");
                    for(let t of xml.getElementsByTagName("SubTexture")) ["x","y","width","height","frameX","frameY","frameWidth","frameHeight"].forEach(at => {
                        if(t.getAttribute(at)) t.setAttribute(at, Math.round(t.getAttribute(at)*s));
                    });
                    saveFile(new XMLSerializer().serializeToString(xml), baseName + ".xml", "text/xml");
                    status(baseName + " OPTIMIZADO");
                };
                rx.readAsText(xFile);
            };
            i.src = e.target.result;
        };
        r.readAsDataURL(pFile);
    }

    // --- MODO 3: CHART FIXER ---
    function adaptChart() {
        const f = document.getElementById('jsonIn').files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = (e) => {
            try {
                let raw = JSON.parse(e.target.result);
                let d = raw.song && typeof raw.song !== 'string' ? raw.song : raw;
                let fixed = { "song": { "song": (d.song || "unknown").toLowerCase(), "notes": d.notes, "bpm": d.bpm, "player1": d.player1 || "bf", "player2": d.player2 || "dad", "speed": d.speed || 2 } };
                saveFile(JSON.stringify(fixed, null, "\t"), fixed.song.song + "_fixed.json", "application/json");
                status("CHART REPARADO");
            } catch(e) { alert("Error en JSON"); }
        };
        r.readAsText(f);
    }

    function saveFile(c, n, t) {
        const b = new Blob([c], {type: t}), a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = n; a.click();
    }
    function status(m) { document.getElementById('status').innerText = "✓ " + m.toUpperCase(); }

    // Redimensionar con mouse
    let isResizing = false;
    document.getElementById('handle-br').onmousedown = (e) => { e.stopPropagation(); isResizing = true; };
    window.onmousemove = (e) => {
        if (!isResizing) return;
        const rect = mainCanvas.getBoundingClientRect();
        const sX = mainCanvas.width / rect.width, sY = mainCanvas.height / rect.height;
        currentSel.w = Math.round(((e.clientX - rect.left) * sX) - currentSel.x);
        currentSel.h = Math.round(((e.clientY - rect.top) * sY) - currentSel.y);
        updateEverything();
    };
    window.onmouseup = () => isResizing = false;
</script>
</body>
</html>
