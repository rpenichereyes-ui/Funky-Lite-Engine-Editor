<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FNF Tool Master - Fixer Edition</title>
<style>
    :root { --primary: #ff3c3c; --bg: #0a0a0a; --card: #161616; --accent: #00ff00; --cyan: #00d4ff; --purple: #a200ff; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #d1d1d1; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 500px; width: 100%; }
    .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #333; margin-bottom: 15px; }
    .header h1 { color: var(--primary); font-size: 20px; text-transform: uppercase; margin: 0; }

    /* PREVIEW FLOTANTE */
    .preview-floater { background: #000; border: 2px solid var(--primary); border-radius: 12px; padding: 10px; text-align: center; position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
    #previewCanvas { background: #1a1a1a; width: 120px; height: 120px; border-radius: 6px; image-rendering: pixelated; display: block; margin: 0 auto; }
    #frameCounter { font-size: 10px; color: #888; margin-top: 5px; font-family: monospace; }

    /* CARDS */
    .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
    .card-title { font-size: 13px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; padding-left: 10px; }
    .mode-1 { border-top: 4px solid var(--primary); } .mode-1 .card-title { color: var(--primary); border-left: 4px solid var(--primary); }
    .mode-2 { border-top: 4px solid var(--cyan); } .mode-2 .card-title { color: var(--cyan); border-left: 4px solid var(--cyan); }
    .mode-3 { border-top: 4px solid var(--purple); } .mode-3 .card-title { color: var(--purple); border-left: 4px solid var(--purple); }

    label { display: block; font-size: 10px; color: #777; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
    input { width: 100%; box-sizing: border-box; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; margin-top: 5px; }
    .btn-red { background: var(--primary); color: #fff; }
    .btn-blue { background: var(--cyan); color: #000; }
    .btn-purple { background: var(--purple); color: #fff; }

    .sheet-viewer { background: #000; border-radius: 8px; border: 1px solid #333; overflow: auto; max-height: 300px; margin-top: 10px; }
    #mainCanvas { display: block; margin: 0 auto; }
    #status { background: #000; color: var(--accent); font-size: 10px; padding: 10px; text-align: center; font-family: monospace; border-radius: 6px; margin-top: 10px; }
</style>
</head>
<body>

<div class="container">
    <div class="header"><h1>FNF TOOL MASTER</h1></div>

    <div class="preview-floater">
        <label style="color:var(--primary)">Preview Animada</label>
        <canvas id="previewCanvas"></canvas>
        <div id="frameCounter">0 / 0</div>
    </div>

    <div class="card mode-1">
        <div class="card-title">Modo 1: Generar XML (Grid)</div>
        <label>Imagen PNG</label>
        <input type="file" id="gridIn" accept="image/png">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>W</label><input type="number" id="gridW" value="100"></div>
            <div style="flex:1;"><label>H</label><input type="number" id="gridH" value="100"></div>
        </div>
        <button class="btn btn-red" onclick="applyGrid()">Visualizar</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="exportXML()">Exportar XML</button>
        <div class="sheet-viewer"><canvas id="mainCanvas"></canvas></div>
    </div>

    <div class="card mode-2">
        <div class="card-title">Modo 2: Optimizar Pack (PNG + XML)</div>
        <label>PNG Original</label><input type="file" id="optPngIn" accept="image/png">
        <label>XML Original</label><input type="file" id="optXmlIn" accept=".xml">
        <label>Escala: <span id="valScale">0.5</span></label>
        <input type="range" id="optScale" min="0.1" max="0.9" step="0.1" value="0.5" oninput="document.getElementById('valScale').innerText=this.value">
        <button class="btn btn-blue" onclick="processOptimization()">Optimizar Ambos</button>
    </div>

    <div class="card mode-3">
        <div class="card-title">Modo 3: Chart Fixer (V1.0 a 0.5.1)</div>
        <label>Archivo JSON del Chart</label>
        <input type="file" id="jsonIn" accept=".json">
        <button class="btn btn-purple" onclick="adaptChart()">Reparar y Adaptar Chart</button>
    </div>

    <div id="status">LISTO PARA REPARAR</div>
</div>

<script>
    var imgSheet = new Image();
    var frames = [];
    var animInt = null;

    // --- MODO 1 ---
    document.getElementById('gridIn').onchange = function(e){
        var r = new FileReader();
        r.onload = function(ev){ imgSheet.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    function applyGrid() {
        if(!imgSheet.src) return;
        var mc = document.getElementById('mainCanvas'), ctx = mc.getContext('2d');
        var gw = parseInt(document.getElementById('gridW').value), gh = parseInt(document.getElementById('gridH').value);
        mc.width = imgSheet.width; mc.height = imgSheet.height;
        ctx.drawImage(imgSheet, 0, 0);
        ctx.strokeStyle = "cyan"; frames = [];
        for(var y=0; y<=mc.height-gh; y+=gh) for(var x=0; x<=mc.width-gw; x+=gw){
            frames.push({x:x, y:y}); ctx.strokeRect(x,y,gw,gh);
        }
        if(animInt) clearInterval(animInt);
        var pc = document.getElementById('previewCanvas'), pctx = pc.getContext('2d'), cur = 0;
        pc.width = gw; pc.height = gh;
        animInt = setInterval(function(){
            if(!frames.length) return;
            pctx.clearRect(0,0,gw,gh); pctx.drawImage(imgSheet, frames[cur].x, frames[cur].y, gw, gh, 0, 0, gw, gh);
            document.getElementById('frameCounter').innerText = (cur+1)+"/"+frames.length;
            cur = (cur+1)%frames.length;
        }, 100);
    }

    function exportXML() {
        var gw = document.getElementById('gridW').value, gh = document.getElementById('gridH').value;
        var xml = '<?xml version="1.0" encoding="utf-8"?>\n<TextureAtlas imagePath="sprite.png">\n';
        frames.forEach((f, i) => xml += `  <SubTexture name="frame${i.toString().padStart(4,'0')}" x="${f.x}" y="${f.y}" width="${gw}" height="${gh}"/>\n`);
        save(xml + '</TextureAtlas>', "sprite.xml", "text/xml");
    }

    // --- MODO 2 ---
    function processOptimization() {
        var p = document.getElementById('optPngIn').files[0], x = document.getElementById('optXmlIn').files[0], s = parseFloat(document.getElementById('optScale').value);
        if(!p || !x) return alert("Faltan archivos");
        var r = new FileReader();
        r.onload = function(e){
            var i = new Image();
            i.onload = function(){
                var c = document.createElement('canvas'); c.width = i.width*s; c.height = i.height*s;
                c.getContext('2d').drawImage(i,0,0,c.width,c.height);
                var a = document.createElement('a'); a.href = c.toDataURL(); a.download="opt.png"; a.click();
                var rx = new FileReader();
                rx.onload = function(ex){
                    var d = new DOMParser().parseFromString(ex.target.result, "text/xml"), t = d.getElementsByTagName("SubTexture");
                    for(var j=0; j<t.length; j++){
                        ["x","y","width","height"].forEach(a => t[j].setAttribute(a, Math.round(t[j].getAttribute(a)*s)));
                    }
                    save(new XMLSerializer().serializeToString(d), "opt.xml", "text/xml");
                };
                rx.readAsText(x);
            };
            i.src = e.target.result;
        };
        r.readAsDataURL(p);
    }

    // --- MODO 3: EL REPARADOR ---
    function adaptChart() {
        var f = document.getElementById('jsonIn').files[0];
        if(!f) return;
        var r = new FileReader();
        r.onload = function(e) {
            try {
                var raw = JSON.parse(e.target.result);
                // Extraer datos sin importar si están en .song o raíz
                var d = raw.song && typeof raw.song !== 'string' ? raw.song : (raw.canción || raw);
                
                var adapted = { "song": {
                    "song": (d.song || "unknown").toLowerCase(),
                    "notes": d.notes || [],
                    "bpm": parseFloat(d.bpm) || 100,
                    "needsVoices": d.needsVoices !== undefined ? d.needsVoices : true,
                    "player1": d.player1 || "bf",
                    "player2": d.player2 || "dad",
                    "gfSection": d.gfSection || d.gfVersion || "gf",
                    "stage": d.stage || "stage",
                    "speed": parseFloat(d.speed || d.scrollSpeed) || 2.0,
                    "validScore": true
                }};

                // Limpieza Profunda de Notas para evitar el crash de la imagen
                if(adapted.song.notes) {
                    adapted.song.notes.forEach(s => {
                        if(s.sectionNotes) {
                            s.sectionNotes = s.sectionNotes.filter(n => n.length >= 3).map(n => {
                                // Solo permitimos [Tiempo, Dirección, Longitud]. 
                                // Borramos el 4to y 5to parámetro que causan error en 0.5.1
                                return [n[0], n[1], n[2]]; 
                            });
                        }
                        if(s.lengthInSteps === undefined) s.lengthInSteps = 16;
                        // Forzar que mustHitSection exista
                        if(s.mustHitSection === undefined) s.mustHitSection = true;
                    });
                }

                save(JSON.stringify(adapted, null, "\t"), adapted.song.song + "_fixed.json", "application/json");
                document.getElementById('status').innerText = "✓ REPARADO PARA 0.5.1";
            } catch(err) { alert("Error en JSON"); }
        };
        r.readAsText(f);
    }

    function save(c, n, t) {
        var b = new Blob([c], {type: t}), a = document.createElement('a');
        a.href = window.URL.createObjectURL(b); a.download = n; a.click();
    }
</script>
</body>
</html>
